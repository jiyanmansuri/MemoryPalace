services:
  - type: web
    name: memorypalace-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: memorypalace-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
databases:
  - name: memorypalace-db
    databaseName: memorypalace
    user: memorypalace
    plan: free
